<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cidade Sustentável</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA INICIAL -->
  <div id="inicio" class="tela">
    <h1>🏙️ Cidade Sustentável</h1>

    <div class="cidade">
      🏢 🏠 🌳 🚲 ☀️
    </div>

    <p>
      Ajude a cidade a se tornar sustentável!
    </p>

    <button onclick="iniciarJogo()">COMEÇAR</button>
  </div>

  <!-- TELA DO JOGO -->
  <div id="jogo" class="tela escondido">

    <h1>🌱 Missão Verde</h1>

    <div class="painel">
      <p>⭐ Pontos: <span id="pontos">0</span></p>
      <p>🌿 Moedas Verdes: <span id="moedas">0</span></p>
    </div>

    <div class="cidade-grande">
      🏢 🏠 🌳 🚲 🚍 ☀️ 🌎
    </div>

    <div class="desafio-box">
      <h2>📢 Desafio Atual</h2>

      <p id="desafio">
        Clique em começar para receber um desafio.
      </p>

      <div id="opcoes"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

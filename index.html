<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Verde</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA INICIAL -->

  <div id="inicio">

    <h1>🌱 MISSÃO VERDE</h1>

    <div class="cidade">
      🏢 🏠 🌳 🚲 ☀️
    </div>

    <p class="texto">
      Ajude a transformar a cidade em um lugar sustentável!
    </p>

    <button onclick="iniciarJogo()">
      COMEÇAR
    </button>

  </div>

  <!-- JOGO -->

  <div id="jogo" class="escondido">

    <h1>🏙️ Cidade Sustentável</h1>

    <!-- PAINEL -->

    <div class="painel">

      <p>⭐ Pontos: <span id="pontos">0</span></p>

      <p>🌿 Moedas Verdes:
        <span id="moedas">0</span>
      </p>

    </div>

    <!-- CIDADE -->

    <div class="cidade-grande">

      🏢 🏠 🌳 ☀️ 🚲 🚍

    </div>

    <!-- PERSONAGEM -->

    <div class="personagem-area">

      <div id="personagem">
        👧
      </div>

    </div>

    <!-- MISSÃO -->

    <div class="missao-box">

      <h2>📜 Missão Atual</h2>

      <p id="missao-texto"></p>

      <button id="btn-missao"
        onclick="cumprirMissao()">

        REALIZAR MISSÃO

      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

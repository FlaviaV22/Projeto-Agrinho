<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EarthGuard Agro</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>🌍 EarthGuard Agro</h1>
    <p>Monitoramento global da agricultura</p>
  </header>

  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="card">
        <h2>Indicadores</h2>

        <div class="indicator">
          <span>🔥 Queimadas</span>
          <strong id="fires">245</strong>
        </div>

        <div class="indicator">
          <span>🌳 Desmatamento</span>
          <strong id="forest">1.240 ha</strong>
        </div>

        <div class="indicator">
          <span>🌱 Produção Sustentável</span>
          <strong id="sustainable">78%</strong>
        </div>
      </div>

      <div class="card">
        <h2>Produção Agrícola</h2>
        <canvas id="agroChart"></canvas>
      </div>

    </aside>

    <!-- Mapa -->
    <main>
      <div id="map"></div>
    </main>

  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>

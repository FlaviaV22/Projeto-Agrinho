<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Missão Verde</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MENU -->

  <div id="inicio">

    <h1>🌱 MISSÃO VERDE</h1>

    <p>
      Transforme sua cidade em um exemplo sustentável!
    </p>

    <button onclick="iniciarJogo()">
      COMEÇAR
    </button>

  </div>

  <!-- TELA DA CIDADE -->

  <div id="cidadeTela" class="escondido">

    <div class="painel">

      <div>⭐ Pontos:
        <span id="pontos">0</span>
      </div>

      <div>🌿 Moedas:
        <span id="moedas">0</span>
      </div>

    </div>

    <!-- CIDADE -->

    <div class="cidade">

      <div class="sol"></div>

      <div class="predio predio1"></div>
      <div class="predio predio2"></div>
      <div class="predio predio3"></div>

      <div id="personagem">
        👧
      </div>

    </div>

    <!-- MISSÃO -->

    <div class="missao-box">

      <h2>📜 Missão</h2>

      <p id="missao-texto"></p>

      <button onclick="abrirMissao()">
        REALIZAR MISSÃO
      </button>

    </div>

  </div>

  <!-- TELA DA MISSÃO -->

  <div id="missaoTela" class="escondido">

    <h1 id="tituloMissao"></h1>

    <!-- CENÁRIO -->

    <div id="cenarioMissao">

      <div id="areaMissao"></div>

    </div>

    <button onclick="executarMissao()">
      EXECUTAR AÇÃO
    </button>

    <br><br>

    <button onclick="voltarCidade()">
      VOLTAR
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Missão Verde</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA INICIAL -->

  <div id="inicio">

    <h1>🌱 MISSÃO VERDE</h1>

    <p>
      Transforme a cidade em um lugar sustentável!
    </p>

    <button onclick="iniciarJogo()">
      COMEÇAR
    </button>

  </div>

  <!-- JOGO -->

  <div id="jogo" class="escondido">

    <!-- PAINEL -->

    <div class="painel">

      <div>⭐ Pontos: <span id="pontos">0</span></div>

      <div>🌿 Moedas: <span id="moedas">0</span></div>

    </div>

    <!-- CIDADE -->

    <div class="cidade">

      <!-- SOL -->

      <div class="sol"></div>

      <!-- PRÉDIOS -->

      <div class="predio predio1"></div>
      <div class="predio predio2"></div>
      <div class="predio predio3"></div>
      <div class="predio predio4"></div>

      <!-- ÁRVORES -->

      <div class="arvore arvore1"></div>
      <div class="arvore arvore2"></div>
      <div class="arvore arvore3"></div>

      <!-- PERSONAGEM -->

      <div id="personagem">
        👧
      </div>

    </div>

    <!-- MISSÕES -->

    <div class="missao-box">

      <h2>📜 Missão Atual</h2>

      <p id="missao-texto"></p>

      <button onclick="cumprirMissao()">

        REALIZAR MISSÃO

      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

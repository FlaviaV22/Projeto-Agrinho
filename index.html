<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Minha Fazenda</title>

  <link rel="stylesheet" href="fazenda.css">
</head>
<body>

  <div class="game">

    <!-- HUD -->

    <div class="hud">

      <h2>🌾 Minha Fazenda</h2>

      <div class="info">
        💰 Moedas: <span id="coins">100</span>
      </div>

      <div class="info">
        🌱 Plantações: <span id="plantsCount">0</span>
      </div>

      <div class="info">
        🐄 Animais: 5
      </div>

      <button onclick="plantar()">
        🌱 Plantar
      </button>

      <button onclick="colher()">
        🚜 Colher
      </button>

    </div>

    <!-- SOL -->

    <div class="sun"></div>

    <!-- CASA -->

    <div class="house">

      <div class="roof"></div>

      <div class="base">
        <div class="door"></div>
      </div>

    </div>

    <!-- ÁRVORES -->

    <div class="tree tree1">
      <div class="leaf"></div>
      <div class="trunk"></div>
    </div>

    <div class="tree tree2">
      <div class="leaf"></div>
      <div class="trunk"></div>
    </div>

    <!-- CAMPO -->

    <div class="field" id="field"></div>

    <!-- PERSONAGEM -->

    <div class="player" id="player">
      🚜
    </div>

  </div>

  <script src="fazenda.js"></script>

</body>
</html>
